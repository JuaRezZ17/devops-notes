apiVersion: apps/v1
kind: Deployment
metadata:
  name: liveness-demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: liveness-demo
  template:
    metadata:
      labels:
        app: liveness-demo
    spec:
      containers:
      - name: python-server
        image: python:3.9-slim
        command: ["/bin/sh", "-c"]
        args: ["mkdir -p /app && echo 'OK' > /app/health && cd /app && python -m http.server 8080"]
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 1