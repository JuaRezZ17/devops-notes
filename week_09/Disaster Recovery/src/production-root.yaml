apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/JuaRezZ17/gitops-lab.git
    targetRevision: main
    path: clusters/production

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true