apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firewall-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/JuaRezZ17/gitops-lab.git
    targetRevision: main
    path: apps/firewall

  destination:
    server: https://kubernetes.default.svc
    namespace: database

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true